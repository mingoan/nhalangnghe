<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#fcfaf6;--paper-dark:#f3eae0;--paper-deeper:#e6dac9;
  --sage:#7a9e8e;--sage-dark:#4a7260;--sage-light:#dde8e1;
  --earth:#8b7355;--earth-light:#cbd2ca;--earth-pale:#f4efe6;
  --brown-deep:#2d2216;--brown-mid:#5c4733;--muted:#73675c;
  --white:#ffffff;--charcoal:#231c19;
  --radius-lg: 20px;--radius-md: 12px;
  --shadow-soft: 0 10px 40px -15px rgba(61,46,30,0.06);
  --shadow-hover: 0 20px 40px -10px rgba(61,46,30,0.12);
  --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--paper);color:var(--brown-deep);font-size:16px;line-height:1.8;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:'Cormorant Garamond',Georgia,serif;font-weight:500;line-height:1.25;color:var(--brown-deep)}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(252,250,246,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(139,115,85,0.1);padding:0 max(2rem,6vw);display:flex;align-items:center;justify-content:space-between;height:70px;transition:var(--transition);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.68rem;font-weight:600;color:var(--brown-deep);text-decoration:none;letter-spacing:-.01em}
.nav-logo span{color:var(--sage-dark);font-weight:400;font-style:italic}
.nav-links{display:flex;gap:2.5rem;list-style:none;align-items:center}
.nav-links a{font-size:.9rem;font-weight:500;color:var(--muted);text-decoration:none;transition:var(--transition);position:relative;padding:0.2rem 0;}
.nav-links a:not(.nav-cta)::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--sage-dark);transition:var(--transition);}
.nav-links a:not(.nav-cta):hover::after{width:100%;}
.nav-links a:hover{color:var(--brown-deep)}
.nav-cta{color:var(--white)!important;background:#a18160;padding:.55rem 1.5rem;border-radius:100px;box-shadow: 0 4px 12px rgba(161,129,96,0.2);transition:var(--transition)!important}
.nav-cta:hover{background:#b19270!important;transform:translateY(-1px);box-shadow: 0 6px 16px rgba(161,129,96,0.3);}

/* HERO */
.hero{display:grid;grid-template-columns:1.1fr 0.9fr;min-height:85vh;padding:5rem max(2rem,6vw);gap:4rem;align-items:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;right:-50px;top:-50px;width:500px;height:500px;border-radius:50%;background:var(--sage-light);opacity:.35;filter:blur(40px);pointer-events:none;z-index:0;}
.hero::after{content:'';position:absolute;left:25%;bottom:-80px;width:350px;height:350px;border-radius:50%;background:var(--earth-pale);opacity:.6;filter:blur(30px);pointer-events:none;z-index:0;}
.hero-content{position:relative;z-index:1}
.eyebrow{display:inline-block;font-size:.75rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--sage-dark);background:rgba(74,114,96,0.08);padding:.4rem 1.1rem;border-radius:100px;margin-bottom:1.75rem;}
.hero h1{font-size:clamp(2.8rem,5vw,4rem);color:var(--brown-deep);margin-bottom:1.5rem;letter-spacing:-.02em;font-weight:500;line-height:1.2;}
.hero h1 em{font-style:italic;color:var(--sage-dark);font-weight:400;}
.hero-desc{font-size:1.05rem;color:var(--muted);max-width:460px;margin-bottom:2.5rem;line-height:1.8}
.hero-actions{display:flex;gap:1.25rem;align-items:center;flex-wrap:wrap}
.btn-primary{background:var(--sage-dark);color:var(--white);padding:.95rem 2.2rem;border-radius:100px;font-size:.9rem;font-weight:500;text-decoration:none;box-shadow: 0 6px 20px -5px rgba(74,114,96,0.4);transition:var(--transition);display:inline-block;}
.btn-primary:hover{background:var(--sage);transform:translateY(-2px);box-shadow: 0 10px 25px -5px rgba(74,114,96,0.5);}
.btn-ghost{color:var(--brown-mid);font-size:.9rem;font-weight:500;text-decoration:none;border-bottom:1px solid var(--earth-light);padding-bottom:3px;transition:var(--transition);}
.btn-ghost:hover{color:var(--sage-dark);border-color:var(--sage);padding-bottom:6px;}
.hero-visual{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;transition:var(--transition);}
.hero-visual:hover{transform:translateY(-4px);}
.illus-wrap{width:100%;max-width:420px;background:var(--white);border-radius:var(--radius-lg);padding:2.5rem;box-shadow:var(--shadow-soft);position:relative;overflow:hidden;border:1px solid rgba(139,115,85,0.05);}

/* TAGBAR */
.tagbar{background:var(--charcoal);padding:1.2rem max(2rem,6vw);display:flex;gap:3rem;align-items:center;justify-content:center;flex-wrap:wrap;}
.tagbar span{font-size:.8rem;font-weight:500;color:rgba(252,250,246,0.6);letter-spacing:.12em;text-transform:uppercase;}
.tagbar .dot{color:rgba(252,250,246,0.25)}

/* SECTIONS BASE */
section{padding:7rem max(2rem,6vw);position:relative;}
.section-eyebrow{font-size:.75rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--sage-dark);display:block;margin-bottom:1rem;}
.section-heading{font-size:clamp(2.1rem,4vw,2.8rem);color:var(--brown-deep);margin-bottom:1.5rem;font-weight:500;letter-spacing:-.01em;}
.section-sub{font-size:1.05rem;color:var(--muted);max-width:580px;line-height:1.8}

/* FOR WHO */
.forwho{background:var(--white);display:grid;grid-template-columns:1.05fr 0.95fr;gap:5rem;align-items:center;}
.pain-points{display:flex;flex-direction:column;gap:1.1rem;margin-top:2.5rem}
.pain-item{display:flex;flex-direction:column;gap:.5rem;padding:1.5rem 1.75rem;background:var(--paper);border-radius:var(--radius-md);border:1px solid rgba(139,115,85,0.06);transition:var(--transition);box-shadow:0 2px 8px rgba(61,46,30,0.01);}
.pain-item:hover{transform:translateX(5px);background:var(--white);border-color:var(--sage-light);box-shadow:var(--shadow-soft);}
.pain-label{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--earth);}
.pain-item p{font-size:.95rem;color:var(--brown-mid);line-height:1.7}

/* CONCEPT */
.concept{background:rgba(243,234,224,0.4);border-top:1px solid rgba(139,115,85,0.05);border-bottom:1px solid rgba(139,115,85,0.05);}
.concept-inner{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;margin-bottom:4.5rem;}
.concept-body p{font-size:1.025rem;color:var(--muted);line-height:1.85;margin-bottom:1.25rem;}
.concept-pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:1.75rem;}
.concept-card{background:var(--white);border:1px solid rgba(139,115,85,0.05);border-radius:var(--radius-lg);padding:2.25rem 2rem;box-shadow:var(--shadow-soft);transition:var(--transition);display:flex;flex-direction:column;gap:1rem;}
.concept-card:hover{transform:translateY(-5px);box-shadow:var(--shadow-hover);border-color:var(--sage-light);}
.concept-icon{width:48px;height:48px;border-radius:12px;background:rgba(74,114,96,0.08);display:flex;align-items:center;justify-content:center;}
.concept-card h4{font-family:'DM Sans',sans-serif;font-size:1.05rem;font-weight:600;color:var(--brown-deep);}
.concept-card p{font-size:.925rem;color:var(--muted);line-height:1.75;margin:0;}

/* LATEST POSTS */
.latest-posts{background:var(--white);}
.lp-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:3.5rem;flex-wrap:wrap;gap:1.5rem;}
.lp-all{font-size:.95rem;font-weight:500;color:var(--sage-dark);text-decoration:none;border-bottom:1px solid var(--sage-light);padding-bottom:3px;transition:var(--transition);}
.lp-all:hover{color:var(--sage);border-color:var(--sage);padding-right:4px;}
.lp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2rem;}
.lp-card{background:var(--paper);border:1px solid rgba(139,115,85,0.05);border-radius:var(--radius-lg);padding:2.25rem 2rem;text-decoration:none;display:flex;flex-direction:column;gap:0.85rem;transition:var(--transition);box-shadow: 0 4px 15px rgba(61,46,30,0.01);}
.lp-card:hover{transform:translateY(-6px);background:var(--white);box-shadow:var(--shadow-hover);border-color:var(--sage-light);}
.lp-cat{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;color:var(--sage-dark);font-weight:600;}
.lp-card h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:600;color:var(--brown-deep);line-height:1.35;transition:var(--transition);}
.lp-card:hover h3{color:var(--sage-dark)}
.lp-card p{font-size:.925rem;color:var(--muted);line-height:1.7;flex:1;}
.lp-read{font-size:.8rem;font-weight:500;color:var(--earth);display:flex;align-items:center;gap:0.25rem;}

/* FOLLOW & EMAIL */
.follow{background:var(--paper-dark);text-align:center;border-top:1px solid rgba(139,115,85,0.05);}
.follow-channels{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;margin-bottom:5rem;margin-top:3rem;}
.channel-card{display:flex;align-items:center;gap:1rem;background:var(--white);border:1px solid rgba(139,115,85,0.04);border-radius:var(--radius-md);padding:1.25rem 1.75rem;text-decoration:none;transition:var(--transition);min-width:240px;box-shadow:var(--shadow-soft);}
.channel-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover);}
.channel-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.channel-icon.fb{background:rgba(24,119,242,0.08)}
.channel-name{font-size:.95rem;font-weight:600;color:var(--brown-deep);display:block;margin-bottom:.15rem;text-align:left;}
.channel-desc{font-size:.8rem;color:var(--muted);text-align:left;}

.email-section{border-top:1px solid rgba(139,115,85,0.15);padding-top:4rem;max-width:500px;margin:0 auto;}
.email-section h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--brown-deep);margin-bottom:.75rem}
.email-section p{font-size:.95rem;color:var(--muted);margin-bottom:2rem;line-height:1.7}
.email-form{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;}
.email-input{padding:1rem 1.75rem;border-radius:100px;border:1.5px solid var(--paper-deeper);background:var(--white);color:var(--brown-deep);font-size:.9rem;font-family:'DM Sans',sans-serif;width:280px;outline:none;transition:var(--transition);box-shadow: inset 0 2px 4px rgba(61,46,30,0.02);}
.email-input:focus{border-color:var(--sage);box-shadow: 0 0 0 4px rgba(122,158,142,0.15);}
.email-input::placeholder{color:var(--muted);opacity:.6}
